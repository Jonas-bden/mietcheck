# Fly.io Konfiguration
app = "mietcheck"
primary_region = "fra"  # Frankfurt — nah an Deutschland

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "mietcheck_data"
  destination = "/data"
