# Render.com Blueprint — 1-Click Deploy
services:
  - type: web
    name: mietcheck
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: HIER_DEIN_PASSWORT
      - key: DATA_DIR
        value: /opt/render/project/src
    disk:
      name: mietcheck-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
